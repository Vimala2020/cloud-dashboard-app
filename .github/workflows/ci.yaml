name: DevOps Dashboard CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Validate Node app
      - name: Run syntax check
        run: node -c index.js

      # 5. Docker login
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cloud-dashboard-app:latest .

      # 7. Verify Docker image
      - name: Check Docker images
        run: docker images

      # 8. Run container test
      - name: Run container test
        run: |
          docker run -d -p 3000:3000 --name test-app ${{ secrets.DOCKERHUB_USERNAME }}/cloud-dashboard-app:latest
          sleep 5
          curl -f http://localhost:3000/ || (echo "App failed to start" && exit 1)
          docker stop test-app
          docker rm test-app

      # 9. Push Docker image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cloud-dashboard-app:latest